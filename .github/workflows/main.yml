name: CryptoFlow Pipeline

on:
  schedule:
    - cron: '*/15 * * * *' 
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Ingest data from CoinGecko
        run: python src/ingest.py
      - name: Create dbt profiles
        run: |
          mkdir -p ~/.dbt
          echo '${{ secrets.GCP_CREDENTIALS }}' > /tmp/gcp_credentials.json
          cat > ~/.dbt/profiles.yml << 'EOF'
          crypto_etl:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: service-account-json
                project: ${{ fromJson(secrets.GCP_CREDENTIALS).project_id }}
                dataset: bronze
                threads: 4
                timeout_seconds: 300
                keyfile_json: ${{ secrets.GCP_CREDENTIALS }}
          EOF
          
      - name: Run dbt build
        run: |
          cd dbt_crypto_etl
          dbt deps
          dbt build

      - name: Notify on failure
        if: failure()
        run: echo "Pipeline failed! Check the logs."